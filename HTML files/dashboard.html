<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .offcanvas-container{
            display: flex;
            align-items: center;
            height: 100vh;
        }
        .offcanvas-container > .offcanvas{
            width: 300px;
        }
        .dashboard-btn{
         position: fixed;   
        }
        .dashboard-gray{
            color: rgb(158, 158, 158);
        }
        .offcanvas-header > img{
            width: 50px;
            height: 50px;
            margin-right: 15px;
            margin-bottom: 10px;
        }
        .dashboard-item{
            display: flex;
            padding-top: 10px;
            padding-bottom: 10px;
        }
        .dashboard-item:hover{
            background-color: rgb(171, 217, 255);
            color: blue;
            cursor: pointer;
        }
        .dashboard-item > a{
            padding-bottom: 10px;
            color: black;
            text-decoration: none;
        }

    </style>
</head>
<body>
<div class="offcanvas-container">
    <div class="offcanvas offcanvas-start" id="dashboard">
        <div class="offcanvas-header">
            <img src="../Images/passport_office.jpg">
            <h5 class="offcanvas-title">YDG<br><p class="fs-6">Dashboard</p></h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <p class="dashboard-gray">DOCUMENTS</p>
            <div class="dashboard-item">
                <i class="bi bi-house-fill"></i>
                <a href="#">Overview</a>
            </div>
            <div class="dashboard-item">
                <i class="bi bi-house-fill"></i>
                <a href="#">Passport</a>
            </div>
            <div class="dashboard-item">
                <i class="bi bi-house-fill"></i>
                <a href="#">National ID</a>
            </div>
            <div class="dashboard-item">
                <i class="bi bi-house-fill"></i>
                <a href="#">Driver's License</a>
            </div>
        </div>
    </div>
<button class="dashboard-btn btn btn-primary p-3 m-3" type="button" data-bs-toggle="offcanvas" data-bs-target="#dashboard"><</button>
</div>

</body>
</html>
